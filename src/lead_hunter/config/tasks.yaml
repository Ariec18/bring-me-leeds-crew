find_leads_task:
  description: >
    Search Google Maps for "{business_type}" businesses in {location}.
    For each business, collect:
    - Business name
    - Address
    - Phone number
    - Website URL (if exists)
    - Rating and number of reviews
    - Business category
    Filter results: keep only businesses with 4.5+ stars and 100+ reviews
    that either have no website or have a clearly outdated one.
    Return a structured JSON list of up to {max_leads} qualified leads.
  expected_output: >
    A JSON array of qualified leads, each containing:
    name, address, phone, website, rating, reviews_count, category,
    google_maps_url, and a qualification_note explaining why this
    is a good prospect.
  agent: lead_scout

analyze_business_task:
  description: >
    For each lead from the previous task, use web search only (no scraping):
    1. Search "BUSINESS_NAME Koh Samui email contact" to find owner email
    2. Search "BUSINESS_NAME Koh Samui Instagram Facebook" for social links
    3. Note 2-3 specific digital gaps (no website / Facebook-only / outdated site)
    Replace BUSINESS_NAME with the actual business name from the lead.
    Be concise — one search per lead maximum. Return enriched leads.
  expected_output: >
    An enriched JSON array where each lead now also includes:
    email (best guess or empty string), social_media_links (list),
    digital_gaps (2-3 bullet points), personalization_note (1 sentence).
  agent: business_analyst

create_demo_website_task:
  description: >
    For each enriched lead, write a website brief JSON file to output/briefs/.
    The brief must include:
    - business_name, category, address, phone, rating, reviews_count
    - template: one of "restaurant" / "spa" / "fitness" / "general"
    - color_scheme: e.g. "warm amber and stone" for restaurants
    - tone: e.g. "authentic, welcoming, family-owned"
    - sections: ["Hero", "About", "Services", "Reviews", "Contact"]
    - key_selling_points: 3 bullet points from the business data
    - demo_prompt: a ready-made Claude prompt to generate the HTML,
      e.g. "Generate a Tailwind HTML landing page for BUSINESS_NAME,
      a CATEGORY in CITY. Tone: TONE. Sections: SECTIONS. Colors: COLORS."
      Replace the CAPS placeholders with the actual business data.
    Save each brief as output/briefs/BUSINESS_SLUG.json using FileWriterTool
    (slug = business name lowercased with spaces replaced by underscores).
  expected_output: >
    A JSON array with each lead now including:
    brief_path (e.g. output/briefs/thai_kitchen.json) and demo_prompt.
    NO HTML generation — just the brief files.
  agent: website_creator

write_proposal_task:
  description: >
    For each lead, produce a personalized HTML email. Use the structure below,
    replacing CAPS placeholders with real lead data.

    SUBJECT: BUSINESS_NAME — We Built You a Free Website Demo

    HTML BODY:
    Start with a short personal opener referencing their Google rating and reviews.
    Mention the specific digital gap found (no website, Facebook-only, etc.).
    Offer the free demo website — tell them to reply to receive the live link.
    List what is included (mobile design, Maps, menu, contact form, HTTPS).
    State pricing: from $500 one-time + $40/month hosting.
    End with the sender signature block shown below — use it exactly as written.

    SIGNATURE BLOCK (always include at the bottom of every email, verbatim):
    <table style="font-family:sans-serif;font-size:14px;color:#333;margin-top:24px">
    <tr><td style="padding:4px 12px 4px 0"><strong>Arsenii Obukhov</strong></td></tr>
    <tr><td style="padding:4px 12px 4px 0;color:#888">Palm York Co., Ltd.</td></tr>
    <tr><td style="padding:4px 12px 4px 0">
      📱 WhatsApp / Telegram:
      <a href="https://wa.me/79129244410">+7 912 924 4410</a>
    </td></tr>
    <tr><td style="padding:4px 12px 4px 0">
      💬 LINE: scan QR below
    </td></tr>
    <tr><td style="padding:8px 0">
      <img src="https://Ariec18.github.io/bring-me-leeds-crew/assets/line_qr.jpg"
           alt="LINE QR Code" width="130"
           style="border-radius:8px;display:block"/>
    </td></tr>
    </table>

    Keep the email body concise — max 100 words before the signature.
  expected_output: >
    A JSON array where each lead now includes:
    email_subject (string) and email_body (HTML string with signature).
  agent: proposal_writer

send_outreach_task:
  description: >
    Review the complete outreach package for each prospect and send emails.
    For each lead:
    1. Verify the email address is present and looks valid
    2. Confirm the demo URL is accessible
    3. Use the Email Sender tool to send the personalized email
    4. Log the result (sent/failed) for each lead
    5. Save all results to output/outreach_log.csv
    IMPORTANT: Do NOT send more than {max_emails_per_run} emails per run.
    IMPORTANT: If dry_run is True, log what WOULD be sent but do NOT call
    the Email Sender tool — just output the preview.
  expected_output: >
    A summary report with:
    - Total leads processed
    - Emails sent successfully (or previewed in dry_run mode)
    - Emails failed or skipped
    - CSV log path
    - Recommended follow-up dates (3-5 days from today)
  agent: outreach_manager
